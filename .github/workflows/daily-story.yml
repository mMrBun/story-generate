name: Import Stories

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

concurrency:
  group: import-stories
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest

    env:
      MXNZP_APP_ID: ${{ secrets.MXNZP_APP_ID }}
      MXNZP_APP_SECRET: ${{ secrets.MXNZP_APP_SECRET }}
      DEEPLX_URL: ${{ secrets.DEEPLX_URL }}
      DEEPLX_URLS: ${{ secrets.DEEPLX_URLS }}
      DEEPLX_TOKEN: ${{ secrets.DEEPLX_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
      STORY_GENERATION_ENABLED: ${{ vars.STORY_GENERATION_ENABLED }}
      STORIES_PER_CATEGORY_PER_RUN: ${{ vars.STORIES_PER_CATEGORY_PER_RUN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Import stories
        run: uv run python scripts/generate_daily_story.py
